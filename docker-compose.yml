version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: 1c_console
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: putopelatudo/1cup:backend:v1.0.0
    build:
      context: ./backend
      dockerfile: ./backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:5432/1c_console
      REDIS_URL: redis://redis:6379/0
      RAC_EXECUTABLE: ${RAC_EXECUTABLE:-/opt/1cv8/x86_64/8.3.23.1739/rac}
      RAC_CLUSTER_HOST: ${RAC_CLUSTER_HOST:-localhost}
      RAC_CLUSTER_PORT: ${RAC_CLUSTER_PORT:-1545}
      RAC_CLUSTER_USER: ${RAC_CLUSTER_USER:-}
      RAC_CLUSTER_PASSWORD: ${RAC_CLUSTER_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost"]}
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: putopelatudo/1cup:frontend:v1.0.0
    build:
      context: ./frontend
      dockerfile: ./frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
