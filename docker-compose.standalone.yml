version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-1c_console}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - 1c-console-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - 1c-console-net

  backend:
    image: putopelatudo/1cup:backend-latest
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-1c_console}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key}
      RAC_EXECUTABLE: ${RAC_EXECUTABLE:-/opt/1cv8/x86_64/8.3.23.1739/rac}
      RAC_CLUSTER_HOST: ${RAC_CLUSTER_HOST:-localhost}
      RAC_CLUSTER_PORT: ${RAC_CLUSTER_PORT:-1545}
      RAC_CLUSTER_USER: ${RAC_CLUSTER_USER:-}
      RAC_CLUSTER_PASSWORD: ${RAC_CLUSTER_PASSWORD:-}
      CORS_ORIGINS: '["http://localhost:8080","http://127.0.0.1:8080"]'
    volumes:
      - /opt/1cv8:/opt/1cv8:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - 1c-console-net

  frontend:
    image: putopelatudo/1cup:frontend-latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - 1c-console-net

volumes:
  postgres_data:
  redis_data:

networks:
  1c-console-net:
    driver: bridge
